<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pokemon</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h2>website name: pokibeer eme idk</h2>
      <section class="search-bar">
        <form id="filterForm">
          <input type="text" id="searchInput" placeholder="Search pokemon..." />
          <button type="submit">Search</button>
        </form>
      </section>
    </header>


    <!--section to choose filter by category -->
    <nav class="filter-controller">
      <form class="filter-controller">
        <select id="type">
          <!-- NOTE: i think use js to iterate array of pokemon types, abilities, gen
          for now, this is temporary -->
          <option value=" " selected>Type</option>
          <option value="all">All</option>
          <option value="all">Fire</option>
          <option value="water">Water</option>
          <option value="grass">Grass</option>
        </select>
        <select id="abilities">
          <option value=" " selected>Abilities</option>
          <option value="all">All</option>
          <option value="static">Static</option>
          <option value="cbody">Cursed Body</option>
          <option value="intimidate">Intimidate</option>
          <!-- oh god how do you do the values of this thing, good luck sei TT -->
          <!-- kung hindi kaya kahit hindi ma include tbh optional man mag filter HAHAHA  -->
        </select>
        <select id="generation">
          <option value=" " selected>Generation</option>
          <option value="all" selected>All</option>
          <option value="gen1">Gen I</option>
          <option value="gen2">Gen II</option>
          <option value="gen3">Gen III</option>
        </select>
        
      </form>
    </nav>


    <main class="main-display">
      <section class="filter-results" id="pokemonGallery"></section>
      <aside id="side-panel">
        <div class="side-panel-card">

          <div class="side-panel-sprites">
            <img id="side-sprite-front" alt="Front" class="side-panel-img">
            <!-- <img id="side-sprite-back" alt="Back" class="side-panel-img"> -->
          </div>
        
          <div class="side-panel-tags"> </div>

          <span class="pokemon-id" id="side-id"></span>
          <h2 class="side-panel--name" id="side-name"></h2>

          <div class="type-container" id="side-types"></div>

          <div class="abilities-section">
            <h4>Abilities:</h4>
            <ul id="side-abilities"></ul>
          </div>

        </div>
      </aside>
    </main>

  <script src="script.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pokemon</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h2>website name: pokibeer eme idk</h2>
      <section class="search-bar">
        <form id="filterForm">
          <input type="text" id="searchInput" placeholder="Type to search a pokemon..." />
          <!-- <button type="submit">Search</button> -->
        </form>
      </section>
    </header>


    <!--section to choose filter by category -->
    <nav class="filter-controller">
      <form class="filter-controller">
        <select id="type"></select>
        <select id="abilities"></select>
        <select id="generation"></select> 
      </form>
    </nav>


    <main class="main-display">
      <section class="filter-results" id="pokemonGallery"></section>
      <aside id="side-panel">
        <div class="side-panel-card">

          <div class="side-panel-sprites">
            <img id="side-sprite" alt="Front" class="side-panel-img">
            <!-- <img id="side-sprite-back" alt="Back" class="side-panel-img"> -->
          </div>
        
          <div class="side-panel-tags"> </div>

          <span class="pokemon-id" id="side-id"></span>
          <span class="pokemon-gen" id="side-gen"></span>
          <h2 class="side-panel--name" id="side-name"></h2>

          <div class="type-container" id="side-types"></div>

          <div class="abilities-section">
            <h4>Abilities:</h4>
            <ul id="side-abilities"></ul>
          </div>

        </div>
      </aside>
    </main>

  <script src="script.js"></script>
  </body>
</html>
